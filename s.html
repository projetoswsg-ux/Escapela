<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Web3 - Fullscreen Launcher</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --safe-area-inset-top: env(safe-area-inset-top);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0e14;
            color: #f3f4f6;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Evita scroll na aplicação base */
        }

        #root {
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Classe para quando o jogo estiver ativo */
        .game-mode #root {
            overflow: hidden;
        }

        /* Botão de fechar flutuante ultra-discreto */
        .exit-fullscreen-btn {
            position: fixed;
            top: calc(10px + var(--safe-area-inset-top));
            right: 15px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .exit-fullscreen-btn:hover, .exit-fullscreen-btn:active {
            opacity: 1;
            background: rgba(239, 68, 68, 0.8);
        }

        /* Animação de entrada */
        .animate-enter {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Remove qualquer delay de toque no mobile */
        * {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const GAMES_DATABASE = [
            { id: 'pixels', title: 'Pixels', network: 'Ronin', cover: 'https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=800&q=80', url: 'https://play.pixels.xyz/', category: 'Social RPG' },
            { id: 'parallel', title: 'Parallel', network: 'Base', cover: 'https://images.unsplash.com/photo-1635322966219-b75ed372eb01?w=800&q=80', url: 'https://parallel.life/', category: 'TCG' },
            { id: 'ev-io', title: 'EV.IO', network: 'Solana', cover: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800&q=80', url: 'https://ev.io/', category: 'FPS' }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('store');
            const [selectedGame, setSelectedGame] = useState(null);
            const [currentGameUrl, setCurrentGameUrl] = useState(null);
            const [isLoading, setIsLoading] = useState(false);

            // Função para solicitar Fullscreen Real
            const requestFullscreen = () => {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) docElm.requestFullscreen();
                else if (docElm.mozRequestFullScreen) docElm.mozRequestFullScreen();
                else if (docElm.webkitRequestFullScreen) docElm.webkitRequestFullScreen();
                else if (docElm.msRequestFullscreen) docElm.msRequestFullscreen();
            };

            // Função para sair do Fullscreen Real
            const exitFullscreen = () => {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
            };

            const launchGame = (game) => {
                setIsLoading(true);
                setCurrentGameUrl(game.url);
                setSelectedGame(null);
                document.body.classList.add('game-mode');
                
                // Dispara o Fullscreen API
                requestFullscreen();
            };

            const closeGame = () => {
                setCurrentGameUrl(null);
                setIsLoading(false);
                document.body.classList.remove('game-mode');
                
                // Sai do Fullscreen
                exitFullscreen();
            };

            // Listener para quando o usuário sai do fullscreen via botão do sistema (ESC ou gesto)
            useEffect(() => {
                const handleFullscreenChange = () => {
                    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                        // Se o usuário saiu do fullscreen mas o jogo ainda está "aberto" na lógica do React
                        // opcionalmente podemos fechar o jogo ou manter apenas o iframe
                    }
                };
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
                return () => {
                    document.removeEventListener('fullscreenchange', handleFullscreenChange);
                    document.removeEventListener('webkitfullscreenchange', handleFullscreenChange);
                };
            }, []);

            if (currentGameUrl) {
                return (
                    <div className="fixed inset-0 bg-black z-[9999] flex flex-col overflow-hidden">
                        <button onClick={closeGame} className="exit-fullscreen-btn">
                            <Icon name="x" size={20} />
                        </button>
                        
                        <div className="w-full h-full relative">
                            {isLoading && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center bg-black z-10">
                                    <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                    <p className="mt-4 text-xs font-bold tracking-[0.2em] text-blue-500 uppercase">Nexus Secure Loading</p>
                                </div>
                            )}
                            <iframe 
                                src={currentGameUrl} 
                                className="w-full h-full border-none shadow-2xl"
                                onLoad={() => setIsLoading(false)}
                                allow="gamepad; ethereum; accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-scripts allow-same-origin"
                            />
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-[#0b0e14]">
                    {/* Header Minimalista */}
                    <header className="p-6 flex justify-between items-center bg-[#0f121a] border-b border-white/5">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-lg"><Icon name="gamepad-2" size={20}/></div>
                            <h1 className="text-xl font-black tracking-tighter">NEXUS</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <Icon name="search" size={20} className="text-gray-500"/>
                            <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-600 border border-white/20"></div>
                        </div>
                    </header>

                    {/* Feed de Jogos */}
                    <main className="flex-1 p-4 md:p-8">
                        <h2 className="text-sm font-bold text-gray-500 uppercase tracking-widest mb-6">Destaques Web3</h2>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {GAMES_DATABASE.map(game => (
                                <div 
                                    key={game.id} 
                                    onClick={() => setSelectedGame(game)}
                                    className="bg-[#161a23] rounded-[2.5rem] overflow-hidden border border-white/5 active:scale-[0.98] transition-all cursor-pointer group"
                                >
                                    <div className="h-48 relative">
                                        <img src={game.cover} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                        <div className="absolute top-4 left-4 bg-black/50 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-bold border border-white/10 uppercase">
                                            {game.network}
                                        </div>
                                    </div>
                                    <div className="p-6 flex justify-between items-center">
                                        <div>
                                            <h4 className="font-black text-lg">{game.title}</h4>
                                            <p className="text-xs text-gray-500">{game.category}</p>
                                        </div>
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); launchGame(game); }}
                                            className="bg-blue-600 hover:bg-blue-500 p-3 rounded-2xl shadow-lg shadow-blue-900/20"
                                        >
                                            <Icon name="play" size={20} className="fill-white"/>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Modal Estilo iOS / Mobile App */}
                    {selectedGame && (
                        <div className="fixed inset-0 z-[1000] flex items-end md:items-center justify-center p-0 md:p-4 animate-enter">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setSelectedGame(null)}></div>
                            <div className="bg-[#1c222d] w-full max-w-xl rounded-t-[3rem] md:rounded-[3rem] overflow-hidden relative border-t border-white/10 shadow-2xl">
                                <div className="h-64 relative">
                                    <img src={selectedGame.cover} className="w-full h-full object-cover" />
                                    <button onClick={() => setSelectedGame(null)} className="absolute top-6 right-6 bg-black/40 p-2 rounded-full backdrop-blur-md">
                                        <Icon name="x" size={20}/>
                                    </button>
                                </div>
                                <div className="p-8 text-center">
                                    <h3 className="text-3xl font-black mb-2">{selectedGame.title}</h3>
                                    <p className="text-blue-500 font-bold text-sm mb-6 uppercase tracking-widest">{selectedGame.network} Ecosystem</p>
                                    
                                    <div className="flex flex-col gap-3">
                                        <button 
                                            onClick={() => launchGame(selectedGame)}
                                            className="w-full bg-white text-black py-5 rounded-[2rem] font-black text-lg shadow-xl active:scale-95 transition-transform"
                                        >
                                            LANÇAR EM FULLSCREEN
                                        </button>
                                        <p className="text-[10px] text-gray-500 uppercase mt-4">A barra de endereços será ocultada para melhor experiência</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
